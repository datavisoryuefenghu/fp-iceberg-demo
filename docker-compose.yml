services:
  kafka:
    image: confluentinc/cp-kafka:7.7.1
    hostname: kafka
    container_name: kafka
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:29093
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:29093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      CLUSTER_ID: "q1Sh-9_ISia_zwGINzRvyQ"
    networks:
      - iceberg-net
    healthcheck:
      test: ["CMD-SHELL", "kafka-broker-api-versions --bootstrap-server localhost:9092 | grep ApiVersion"]
      interval: 10s
      timeout: 10s
      retries: 10

  minio:
    image: minio/minio
    hostname: minio
    container_name: minio
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    command: server /data --console-address ":9001"
    volumes:
      - minio-data:/data
    networks:
      - iceberg-net
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 5s
      retries: 5

  minio-init:
    image: minio/mc
    container_name: minio-init
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 ${MINIO_ROOT_USER} ${MINIO_ROOT_PASSWORD} &&
      mc mb --ignore-existing local/${MINIO_BUCKET} &&
      echo 'Bucket ${MINIO_BUCKET} created'
      "
    networks:
      - iceberg-net

  mysql:
    image: mysql:8.0
    hostname: mysql
    container_name: mysql
    ports:
      - "3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
    volumes:
      - mysql-data:/var/lib/mysql
      - ./mysql-init:/docker-entrypoint-initdb.d
    networks:
      - iceberg-net
    healthcheck:
      test: ["CMD-SHELL", "mysql -u ${MYSQL_USER} -p${MYSQL_PASSWORD} -e 'SELECT 1 FROM ${MYSQL_DATABASE}.feature LIMIT 1' 2>/dev/null || exit 1"]
      interval: 5s
      timeout: 5s
      start_period: 30s
      retries: 10

  iceberg-rest:
    build:
      context: .
      dockerfile: Dockerfile.iceberg-rest
    hostname: iceberg-rest
    container_name: iceberg-rest
    ports:
      - "8181:8181"
    environment:
      CATALOG_WAREHOUSE: s3://${MINIO_BUCKET}/
      CATALOG_IO__IMPL: org.apache.iceberg.aws.s3.S3FileIO
      CATALOG_S3_ENDPOINT: ${MINIO_ENDPOINT}
      CATALOG_S3_PATH__STYLE__ACCESS: "true"
      CATALOG_URI: jdbc:mysql://mysql:3306/${MYSQL_DATABASE}
      CATALOG_JDBC_USER: ${MYSQL_USER}
      CATALOG_JDBC_PASSWORD: ${MYSQL_PASSWORD}
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY}
      AWS_REGION: ${AWS_REGION}
    depends_on:
      minio-init:
        condition: service_completed_successfully
      mysql:
        condition: service_healthy
    networks:
      - iceberg-net
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'echo > /dev/tcp/localhost/8181' || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 10

  kafka-connect:
    build:
      context: .
      dockerfile: Dockerfile.connect
    hostname: kafka-connect
    container_name: kafka-connect
    ports:
      - "8083:8083"
    environment:
      CONNECT_BOOTSTRAP_SERVERS: kafka:9092
      CONNECT_REST_PORT: 8083
      CONNECT_GROUP_ID: iceberg-connect
      CONNECT_CONFIG_STORAGE_TOPIC: _connect-configs
      CONNECT_OFFSET_STORAGE_TOPIC: _connect-offsets
      CONNECT_STATUS_STORAGE_TOPIC: _connect-status
      CONNECT_CONFIG_STORAGE_REPLICATION_FACTOR: 1
      CONNECT_OFFSET_STORAGE_REPLICATION_FACTOR: 1
      CONNECT_STATUS_STORAGE_REPLICATION_FACTOR: 1
      CONNECT_KEY_CONVERTER: org.apache.kafka.connect.storage.StringConverter
      CONNECT_VALUE_CONVERTER: org.apache.kafka.connect.json.JsonConverter
      CONNECT_VALUE_CONVERTER_SCHEMAS_ENABLE: "false"
      CONNECT_REST_ADVERTISED_HOST_NAME: kafka-connect
      CONNECT_PLUGIN_PATH: /usr/share/java,/usr/share/confluent-hub-components
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY}
      AWS_REGION: ${AWS_REGION}
    depends_on:
      kafka:
        condition: service_healthy
      iceberg-rest:
        condition: service_healthy
    networks:
      - iceberg-net
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8083/connectors || exit 1"]
      interval: 10s
      timeout: 10s
      retries: 15

  trino:
    image: trinodb/trino:439
    hostname: trino
    container_name: trino
    ports:
      - "8080:8080"
    volumes:
      - ./trino/catalog:/etc/trino/catalog
    depends_on:
      iceberg-rest:
        condition: service_healthy
    networks:
      - iceberg-net
    healthcheck:
      test: ["CMD-SHELL", "trino --execute 'SELECT 1' || exit 1"]
      interval: 10s
      timeout: 10s
      retries: 15

  clickhouse:
    image: clickhouse/clickhouse-server:24.3
    hostname: clickhouse
    container_name: clickhouse
    ports:
      - "8123:8123"   # HTTP API (used by migration/export.py)
    volumes:
      - ./migration/clickhouse-init:/docker-entrypoint-initdb.d
    networks:
      - iceberg-net
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8123/ping || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 10

  starrocks:
    image: starrocks/allin1-ubuntu:latest
    hostname: starrocks
    container_name: starrocks
    ports:
      - "9030:9030"   # MySQL protocol (queries)
      - "8030:8030"   # FE HTTP UI
    depends_on:
      iceberg-rest:
        condition: service_healthy
    networks:
      - iceberg-net
    healthcheck:
      test: ["CMD-SHELL", "mysql -P 9030 -h 127.0.0.1 -u root -e 'SELECT 1' 2>/dev/null || exit 1"]
      interval: 10s
      timeout: 10s
      retries: 30

volumes:
  minio-data:
  mysql-data:

networks:
  iceberg-net:
    driver: bridge
